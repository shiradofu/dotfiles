[[plugins]]
repo = 'kana/vim-submode'
hook_add = '''
  call submode#enter_with('bufmove', 'n', '', 's>', '3<C-w>>')
  call submode#enter_with('bufmove', 'n', '', 's<', '3<C-w><')
  call submode#enter_with('bufmove', 'n', '', 's+', '3<C-w>+')
  call submode#enter_with('bufmove', 'n', '', 's-', '3<C-w>-')
  call submode#map('bufmove', 'n', '', '>', '3<C-w>>')
  call submode#map('bufmove', 'n', '', '<', '3<C-w><')
  call submode#map('bufmove', 'n', '', '+', '3<C-w>+')
  call submode#map('bufmove', 'n', '', '-', '3<C-w>-')
'''

[[plugins]]
