[[plugins]]
repo = 'junegunn/fzf'
build = './install --all'

[[plugins]]
repo = 'junegunn/fzf.vim'
hook_add = """
  nnoremap <silent> sf :Files<CR>
  nnoremap <silent> st :<C-u>tabnew<CR>:Files<CR>
  nnoremap <silent> sx :<C-u>new<CR>:Files<CR>
  nnoremap <silent> sv :<C-u>vnew<CR>:Files<CR>
  " let g:fzf_layout = { 'down': '~100%' }
  let g:fzf_layout = { 'window': 'call CreateCenteredFloatingWindow()' }
  command! -bang -nargs=* Rg
  \ call fzf#vim#grep(
  \ 'rg --column --line-number --hidden --ignore-case --no-heading --color=always '.shellescape(<q-args>), 1,
  \ <bang>0 ? fzf#vim#with_preview({'options': '--delimiter : --nth 4..'}, 'up:60%')
  \ : fzf#vim#with_preview({'options': '--delimiter : --nth 4..'}, 'right:50%:hidden', '?'),
  \ <bang>0)

  command! -bang -nargs=? -complete=dir Files
        \ call fzf#vim#files(<q-args>, fzf#vim#with_preview(), <bang>0)

  " floating fzf window with borders
  function! CreateCenteredFloatingWindow()
      let width = min([&columns - 4, max([80, &columns - 20])])
      let height = min([&lines - 4, max([20, &lines - 10])])
      let top = ((&lines - height) / 2) - 1
      let left = (&columns - width) / 2
      let opts = {'relative': 'editor', 'row': top, 'col': left, 'width': width, 'height': height, 'style': 'minimal'}

      let top = "╭" . repeat("─", width - 2) . "╮"
      let mid = "│" . repeat(" ", width - 2) . "│"
      let bot = "╰" . repeat("─", width - 2) . "╯"
      let lines = [top] + repeat([mid], height - 2) + [bot]
      let s:buf = nvim_create_buf(v:false, v:true)
      call nvim_buf_set_lines(s:buf, 0, -1, v:true, lines)
      call nvim_open_win(s:buf, v:true, opts)
      set winhl=Normal:Floating
      let opts.row += 1
      let opts.height -= 2
      let opts.col += 2
      let opts.width -= 4
      call nvim_open_win(nvim_create_buf(v:false, v:true), v:true, opts)
      au BufWipeout <buffer> exe 'bw '.s:buf
  endfunction
"""

[[plugins]]
repo = 'cocopon/iceberg.vim'
hook_add = '''
  au myau VimEnter * nested colorscheme iceberg
  au myau ColorScheme *
  \ highlight Normal                  ctermbg=none |
  \ highlight NonText                 ctermbg=none |
  \ highlight LineNr                  ctermbg=none |
  \ highlight Folded                  ctermbg=none |
  \ highlight EndOfBuffer             ctermbg=none |
  \ highlight DiffAdd     ctermfg=202 ctermbg=none |
  \ highlight DiffDelete  ctermfg=234 ctermbg=none |
  \ highlight DiffText    ctermfg=220 ctermbg=none  |
  \ highlight DiffChange  ctermfg=255 ctermbg=none |
  \ highlight TabLineSel  ctermfg=1   ctermbg=0
'''

[[plugins]]
repo = 'tpope/vim-fugitive'
hook_add = '''
  let g:nremap = {"s": "<Nop>"}
  nnoremap <Plug>(fugitive) <Nop>
  nmap <C-g> <Plug>(fugitive)
  nnoremap <silent> <Plug>(fugitive)s :tabnew<CR><C-o>:<C-u>Gstatus<CR>
  nnoremap <silent> <Plug>(fugitive)d :tabnew<CR><C-o>:<C-u>Gdiff<CR>
'''

[[plugins]]
repo = 'airblade/vim-gitgutter'
hook_add = '''
  let g:gitgutter_sign_added = '‖'
  let g:gitgutter_sign_modified = '‖'
  let g:gitgutter_sign_removed = '‖'
  let g:gitgutter_sign_modified_removed = '‖'
  let g:gitgutter_sign_removed_first_line = '‖'
  au myau ColorScheme *
  \   highlight GitGutterAdd    ctermfg=2  ctermbg=none
  \ |	highlight GitGutterChange ctermfg=12 ctermbg=none
  \ |	highlight GitGutterDelete ctermfg=1  ctermbg=none
'''

[[plugins]]
repo = '907th/vim-auto-save'
hook_add = '''
  let g:auto_save = 1
  let g:auto_save_silent = 1
  " git管理下にあるファイルでのみ有効化
  " ref: https://utgwkk.hateblo.jp/entry/2017/03/24/163730
  function! g:GitOrNot()
    if !exists("*fugitive#head") || "" == fugitive#head()
      return 0
    endif
    let s:git_ls = systemlist('git ls-tree -r master --name-only')
    return match(s:git_ls, expand("%")) + 1
  endfunction
  autocmd myau BufEnter * let b:auto_save = g:GitOrNot()
  autocmd myau FileType gitcommit let b:auto_save = 0
'''

